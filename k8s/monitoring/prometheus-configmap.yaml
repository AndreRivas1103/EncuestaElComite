apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: encuesta
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: encuesta-backend
        metrics_path: /metrics
        static_configs:
          - targets: ['back:3000']
            labels:
              service: backend
              app: encuesta
