apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: encuesta
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: encuesta
        orgId: 1
        folder: Encuesta El Comité
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards
