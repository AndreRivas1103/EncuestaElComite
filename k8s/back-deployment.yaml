apiVersion: apps/v1
kind: Deployment
metadata:
  name: back
  namespace: encuesta
  labels:
    app: back
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
        - name: back
          image: encuestaelcomite-back:k8s
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: CORS_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
