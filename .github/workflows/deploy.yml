name: CI/CD Pipeline - Encuesta El Comite
# La publicación de imágenes está en docker-publish.yml (back + client).
# La DB sigue siendo postgres:16-alpine en compose/k8s, sin imagen en Hub.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    name: Verificar entorno
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Verificar versiones del entorno
        run: |
          echo "Comprobando que el entorno virtual esté correcto:"
          node -v
          npm -v
      - name: Instalar dependencias y ejecutar pruebas
        run: |
          npm ci
          npm run lint
          npm run test
      - name: Iniciar sesión en Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Construir y subir imagen de Docker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-back:latest