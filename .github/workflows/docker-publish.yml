name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push → Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (con reintentos)
        uses: nick-fields/retry@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 5
          command: |
            if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
              echo "Faltan secrets: configura DOCKERHUB_USERNAME y DOCKERHUB_TOKEN en el repositorio."
              exit 1
            fi
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-back:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-back:${{ github.sha }}

      - name: Build and push frontend (K8s / nginx)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/client/Dockerfile.k8s
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-client:${{ github.sha }}
