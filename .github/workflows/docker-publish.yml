name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-back:
    name: Backend → Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-back:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-back:${{ github.sha }}

  publish-client:
    name: Frontend → Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend (producción)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/client/Dockerfile.k8s
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/encuestaelcomite-client:${{ github.sha }}
