# Stack mínimo para smoke tests (solo API + PostgreSQL)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: encuesta
      POSTGRES_PASSWORD: encuesta
      POSTGRES_DB: encuestaelcomite
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encuesta -d encuestaelcomite"]
      interval: 3s
      timeout: 5s
      retries: 12

  back:
    build:
      context: .
      dockerfile: ./packages/server/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://encuesta:encuesta@db:5432/encuestaelcomite
      POSTGRES_SSL: "false"
    ports:
      - "3011:3000"
    depends_on:
      db:
        condition: service_healthy
